name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - "lib/db/schema.ts"   # only runs when schema changes

jobs:
  migrate:
    name: Push Drizzle Schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Push schema to Supabase
        run: npx drizzle-kit push --config=drizzle.config.ts
        env:
          # Use the DIRECT Supabase connection (port 5432) for migrations
          # NOT the pooler (port 6543) — drizzle-kit requires a direct connection
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
